services:
  # ─── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nifn-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=nifn
      - POSTGRES_USER=nifn
      - POSTGRES_PASSWORD=nifn_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - nifn-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nifn -d nifn"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Laravel API ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend-laravel-api
      dockerfile: Dockerfile
    container_name: nifn-api
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - storage_data:/app/storage/app/public
      - ./backend-laravel-api/app:/app/app
      - ./backend-laravel-api/config:/app/config
      - ./backend-laravel-api/routes:/app/routes
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - APP_KEY=base64:0uer5SB2fHUUsZE2v3ht31f74QlP0KcbJfBGpvoy4l4=
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=nifn
      - DB_USERNAME=nifn
      - DB_PASSWORD=nifn_secret
      - SESSION_DRIVER=file
      - FILESYSTEM_DISK=public
      - CACHE_STORE=file
      - QUEUE_CONNECTION=sync
      - LOG_LEVEL=debug
      - FRONTEND_URL=http://website:3000
      - DEVELOPER_PORTAL_URL=http://developer-portal:3000
      - ADMIN_URL=http://admin:3000
      - REVALIDATE_SECRET=nifn-secret-2024
      - SANCTUM_STATEFUL_DOMAINS=localhost:3007,localhost:3008,localhost:3006
    networks:
      - nifn-network
    restart: unless-stopped

  # ─── Website (public frontend) ──────────────────────────────
  website:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api
        - NEXT_PUBLIC_SITE_URL=http://localhost:3007
        - NEXT_PUBLIC_DEVELOPER_PORTAL_URL=http://localhost:3006
        - NEXT_PUBLIC_ADMIN_URL=http://localhost:3008
        - REVALIDATE_SECRET=nifn-secret-2024
    container_name: nifn-website
    ports:
      - "3007:3000"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://host.docker.internal:8000/api
      - NEXT_PUBLIC_SITE_URL=http://localhost:3007
      - NEXT_PUBLIC_DEVELOPER_PORTAL_URL=http://localhost:3006
      - NEXT_PUBLIC_ADMIN_URL=http://localhost:3008
      - REVALIDATE_SECRET=nifn-secret-2024
    networks:
      - nifn-network
    restart: unless-stopped

  # ─── Admin Dashboard ─────────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
        - NEXT_PUBLIC_SITE_URL=http://localhost:3008
        - NEXT_PUBLIC_MAIN_SITE_URL=http://localhost:3007
        - NEXT_PUBLIC_DEVELOPER_PORTAL_URL=http://localhost:3006
    container_name: nifn-admin
    ports:
      - "3008:3000"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_SITE_URL=http://localhost:3008
      - NEXT_PUBLIC_MAIN_SITE_URL=http://localhost:3007
      - NEXT_PUBLIC_DEVELOPER_PORTAL_URL=http://localhost:3006
    networks:
      - nifn-network
    restart: unless-stopped

  # ─── Developer Portal ──────────────────────────────────────
  developer-portal:
    build:
      context: ./developer-portal
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api
        - NEXT_PUBLIC_SITE_URL=http://localhost:3006
        - NEXT_PUBLIC_MAIN_SITE_URL=http://localhost:3007
        - NEXT_PUBLIC_ADMIN_URL=http://localhost:3008
        - REVALIDATE_SECRET=nifn-secret-2024
    container_name: nifn-developer
    ports:
      - "3006:3000"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://host.docker.internal:8000/api
      - NEXT_PUBLIC_SITE_URL=http://localhost:3006
      - NEXT_PUBLIC_MAIN_SITE_URL=http://localhost:3007
      - NEXT_PUBLIC_ADMIN_URL=http://localhost:3008
      - REVALIDATE_SECRET=nifn-secret-2024
    networks:
      - nifn-network
    restart: unless-stopped

  # ─── Nginx (reverse proxy) ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nifn-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - storage_data:/storage:ro
    depends_on:
      - backend
      - website
      - admin
      - developer-portal
    networks:
      - nifn-network
    restart: unless-stopped

volumes:
  pgdata:
  storage_data:

networks:
  nifn-network:
    driver: bridge
